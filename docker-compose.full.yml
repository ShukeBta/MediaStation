# ============================================================
#  MediaStation — 完整 Docker Compose 配置
#  支持: 群晖 / 威联通 / 极空间 / 绿联 / Linux / macOS / Windows
# ============================================================

version: "3.8"

services:
  # ── 主服务 ──
  mediastation:
    image: mediastation/mediastation:latest
    container_name: mediastation
    restart: unless-stopped
    ports:
      - "${MS_PORT:-3001}:3001"
    environment:
      # ── 时区 ──
      - TZ=${TZ:-Asia/Shanghai}

      # ── 应用配置 ──
      - APP_SECRET_KEY=${APP_SECRET_KEY:-please-change-this}  # ⚠️ 生产环境必须修改
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_PORT=3001

      # ── 数据目录 ──
      - DATA_DIR=/data

      # ── 数据库（留空使用 SQLite） ──
      # - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/mediastation

      # ── TMDb（必填） ──
      - TMDB_API_KEY=${TMDB_API_KEY}  # ⚠️ 必填
      - TMDB_LANGUAGE=${TMDB_LANGUAGE:-zh-CN}

      # ── 豆瓣（可选） ──
      # - DOUBAN_COOKIE=${DOUBAN_COOKIE}

      # ── Bangumi（可选） ──
      # - BANGUMI_TOKEN=${BANGUMI_TOKEN}

      # ── AI 刮削（可选，OpenAI 兼容 API） ──
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

      # ── qBittorrent ──
      - QB_HOST=${QB_HOST:-http://localhost:8080}
      - QB_USERNAME=${QB_USERNAME:-admin}
      - QB_PASSWORD=${QB_PASSWORD:-adminadmin}

      # ── Transmission ──
      # - TR_HOST=${TR_HOST:-http://localhost:9091}
      # - TR_USERNAME=${TR_USERNAME:-}
      # - TR_PASSWORD=${TR_PASSWORD:-}

      # ── Aria2 ──
      # - ARIA2_HOST=${ARIA2_HOST:-http://localhost:6800}
      # - ARIA2_SECRET=${ARIA2_SECRET:-}

      # ── Telegram 通知 ──
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

      # ── 微信通知 ──
      # - WECHAT_SENDKEY=${WECHAT_SENDKEY}

      # ── Bark 通知 ──
      # - BARK_SERVER=${BARK_SERVER:-https://api.day.app}
      # - BARK_KEY=${BARK_KEY}

      # ── 邮件通知 ──
      # - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      # - SMTP_PORT=${SMTP_PORT:-587}
      # - SMTP_USER=${SMTP_USER}
      # - SMTP_PASSWORD=${SMTP_PASSWORD}
      # - SMTP_FROM=${SMTP_FROM:-noreply@mediastation.local}

      # ── 硬件加速 ──
      - HW_ACCEL=${HW_ACCEL:-auto}  # auto/qsv/vaapi/nvenc/videotoolbox/none
      - MAX_TRANSCODE_JOBS=${MAX_TRANSCODE_JOBS:-2}
      - FFMPEG_PATH=${FFMPEG_PATH:-ffmpeg}
      - FFPROBE_PATH=${FFFPROBE_PATH:-ffprobe}

    volumes:
      # 持久化数据
      - ${DATA_DIR:-./data}:/data
      # 媒体目录
      - ${MOVIES_DIR:-./media/movies}:/data/media/movies:ro
      - ${TV_DIR:-./media/tv}:/data/media/tv:ro
      - ${ANIME_DIR:-./media/anime}:/data/media/anime:ro
      # 下载目录
      - ${DOWNLOADS_DIR:-./downloads}:/data/downloads:rw
      # 配置文件（可选，用于持久化配置）
      # - ${CONFIG_DIR:-./config}:/config:ro

    # ── 设备映射（硬件加速） ──
    devices:
      # Intel GPU (QSV)
      - /dev/dri:/dev/dri
      # NVIDIA GPU (NVENC)
      # - /dev/nvidia0:/dev/nvidia0
      # - /dev/nvidiactl:/dev/nvidiactl
      # - /dev/nvidia-uvm:/dev/nvidia-uvm
      # - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools

    # ── 网络配置 ──
    networks:
      - mediastation-net

    # ── 用户/组（可选，指定运行用户） ──
    # user: "1000:1000"

    # ── 健康检查 ──
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ── 日志配置 ──
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL（可选，大规模部署时使用） ──
  postgres:
    image: postgres:16-alpine
    container_name: mediastation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediastation
      POSTGRES_USER: mediastation
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediastation123}  # ⚠️ 修改默认密码
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
    networks:
      - mediastation-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediastation"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 仅在需要时启动
    profiles:
      - database

  # ── Redis（可选，缓存加速） ──
  redis:
    image: redis:7-alpine
    container_name: mediastation-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ${REDIS_DATA_DIR:-./redis-data}:/data
    networks:
      - mediastation-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - cache

  # ── qBittorrent（可选，如果 NAS 上未单独部署） ──
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: mediastation-qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"    # WebUI
      - "6881:6881"    # BT/TCP
      - "6881:6881/udp"  # BT/UDP
    volumes:
      - ${QB_CONFIG_DIR:-./qbittorrent-config}:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
    networks:
      - mediastation-net
    profiles:
      - downloader

  # ── Transmission（可选） ──
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: mediastation-transmission
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=9091
      - TZ=Asia/Shanghai
    ports:
      - "9091:9091"    # WebUI
      - "51413:51413"  # BT/TCP
      - "51413:51413/udp"  # BT/UDP
    volumes:
      - ${TR_CONFIG_DIR:-./transmission-config}:/config
      - ${TR_DOWNLOADS_DIR:-./downloads}:/downloads
    networks:
      - mediastation-net
    profiles:
      - downloader

  # ── Watchtower（可选，自动更新容器） ──
  watchtower:
    image: containrrr/watchtower:latest
    container_name: mediastation-watchtower
    restart: unless-stopped
    command: --schedule "0 2 * * *" --include-restarting --include-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mediastation-net
    profiles:
      - auto-update

networks:
  mediastation-net:
    driver: bridge
