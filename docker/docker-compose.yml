# ===========================================
# MediaStation Docker 完整部署配置
# ===========================================
# 复制此文件为 docker-compose.yml 并配置 .env 文件

version: '3.8'

services:
  # ===========================================
  # MediaStation 后端服务
  # ===========================================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: mediastation/backend:latest
    container_name: mediastation-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3002}:3002"
    environment:
      - APP_NAME=MediaStation
      - APP_PORT=3002
      - APP_DEBUG=false
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - DATA_DIR=/data

      # 数据库
      - DATABASE_URL=sqlite+aiosqlite:///data/mediastation.db

      # TMDb API
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_LANGUAGE=zh-CN

      # 下载器
      - QB_HOST=http://qbittorrent:8080
      - QB_USERNAME=${QB_USERNAME:-admin}
      - QB_PASSWORD=${QB_PASSWORD:-adminadmin}

      # 通知 (可选)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}

    volumes:
      - ${DATA_DIR:-../data}:/data
      - ${MEDIA_DIR:-../media}:/media:ro
      - ${DOWNLOAD_DIR:-../downloads}:/downloads
    networks:
      - mediastation-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # qBittorrent 下载器
  # ===========================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: mediastation-qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ${DOWNLOAD_DIR:-../downloads}:/downloads
      - ${MEDIA_DIR:-../media}:/media:ro
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - mediastation-net

# ===========================================
# 网络配置
# ===========================================
networks:
  mediastation-net:
    driver: bridge
