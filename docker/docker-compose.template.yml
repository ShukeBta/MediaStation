# ===========================================
# MediaStation Docker 部署模板
# ===========================================
# 使用方式: cp docker-compose.template.yml docker-compose.yml
# 然后编辑 docker-compose.yml 配置你的环境

version: '3.8'

services:
  # ===========================================
  # MediaStation 后端服务
  # ===========================================
  backend:
    image: mediastation/backend:latest
    container_name: mediastation-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3002}:3002"
    environment:
      - APP_NAME=MediaStation
      - APP_PORT=3002
      - APP_DEBUG=false
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - DATA_DIR=/app/data

      # 数据库
      - DATABASE_URL=sqlite+aiosqlite:///app/data/mediastation.db

      # TMDb API
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_LANGUAGE=zh-CN

      # 下载器
      - QB_HOST=${QB_HOST:-http://qbittorrent:8080}
      - QB_USERNAME=${QB_USERNAME:-admin}
      - QB_PASSWORD=${QB_PASSWORD:-adminadmin}

      # 通知 (可选)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}

    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${MEDIA_DIR:-./media}:/media:ro
    networks:
      - mediastation-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # qBittorrent 下载器
  # ===========================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: mediastation-qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
      - ${MEDIA_DIR:-./media}:/media:ro
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - mediastation-net

  # ===========================================
  # Nginx 反向代理 (可选)
  # ===========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: mediastation-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - mediastation-net

# ===========================================
# 网络配置
# ===========================================
networks:
  mediastation-net:
    driver: bridge
