# ============================================================
#  MediaStation — Nginx 反向代理配置模板
#  用法: cp nginx.example.conf /etc/nginx/conf.d/mediastation.conf
#        然后根据实际环境修改 server_name 和路径
#        nginx -t && nginx -s reload
# ============================================================

# ── HTTP → HTTPS 重定向 ──
server {
    listen 80;
    server_name your-domain.com;  # ⚠️ 修改为你的域名或 IP

    # Let's Encrypt 证书验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ──
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # ⚠️ 修改为你的域名或 IP

    # ── SSL 证书（Let's Encrypt / 自签证书） ──
    ssl_certificate     /etc/nginx/ssl/mediastation.pem;       # ⚠️ 证书路径
    ssl_certificate_key /etc/nginx/ssl/mediastation.key;       # ⚠️ 私钥路径
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── 安全头 ──
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 日志 ──
    access_log /var/log/nginx/mediastation_access.log;
    error_log  /var/log/nginx/mediastation_error.log;

    # ── 上传限制（种子文件等） ──
    client_max_body_size 50M;

    # ── 前端静态资源（SPA） ──
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API 接口 ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传超时（添加种子等操作可能较慢）
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── SSE 实时事件（长连接） ──
    location /api/system/events {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection          '';
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # SSE 必须关闭缓冲
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
    }

    # ── 视频流（大文件 + Range 请求） ──
    location /api/playback/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件流式传输
        proxy_buffering          off;
        proxy_request_buffering  off;
        proxy_read_timeout       3600s;
        proxy_send_timeout       3600s;
        client_max_body_size     0;
    }

    # ── 健康检查（供负载均衡器使用） ──
    location /api/system/health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }
}
