{{/*
MediaStation — Secret for sensitive data
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mediastation.fullname" . }}
  labels:
    {{- include "mediastation.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.TMDB_API_KEY }}
  TMDB_API_KEY: {{ .Values.secret.TMDB_API_KEY }}
  {{- end }}
  {{- if .Values.env.APP_SECRET_KEY }}
  APP_SECRET_KEY: {{ .Values.env.APP_SECRET_KEY }}
  {{- end }}
  {{- if .Values.database.type == "postgresql" }}
  {{- if .Values.database.external.existingSecret }}
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:%d/%s" .Values.database.external.username (printf "$(%s)" .Values.database.external.secretKey) .Values.database.external.host .Values.database.external.port .Values.database.external.database | b64enc | quote }}
  {{- end }}
  {{- end }}
